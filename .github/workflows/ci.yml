name: CI

# Gate every push / PR on the test suite. Two broken tests
# (flockmux-mcp tools_list, flockmux-storage orphan-recordings) shipped on
# main precisely because nothing ran `cargo test` before merge — this is the
# guard against that recurring.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  harness:
    name: Harness check (cross-file invariants)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      # Mechanical guards for cross-file footguns the compiler / cargo test
      # can't catch: the two MessageRecord DTOs drifting apart, a storage type
      # not re-exported from lib.rs, Tauri externalBin missing a sidecar binary,
      # or the codex per-agent CODEX_HOME injection getting dropped. All rules
      # are STATIC file reads (no git history needed), so a default checkout is
      # fine. Add a rule in scripts/harness-check.mjs each time a new
      # silent-failure footgun is hit.
      - name: Run harness check
        run: node scripts/harness-check.mjs

  rust:
    name: Rust (build · test · clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # rust-toolchain.toml pins channel=stable + clippy/rustfmt, so rustup
      # auto-installs the right toolchain and components on first cargo call.
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace --locked
      - name: Test (hard gate)
        run: cargo test --workspace --locked
      - name: Clippy (informational)
        run: cargo clippy --workspace --all-targets
        continue-on-error: true
      - name: Format check (informational)
        run: cargo fmt --all -- --check
        continue-on-error: true

  smoke:
    name: E2E smoke (server · directions live-refresh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v5
        with:
          # global WebSocket (used by the .mjs smokes) is stable on Node 22.
          node-version: 22
      - name: Build server
        run: cargo build -p flockmux-server --locked
      - name: Boot isolated server + run directions smoke
        # No real CLI needed: directions-smoke drives create/rename/delete over
        # REST and asserts the ThreadChanged broadcasts on /ws/swarm. Data dirs
        # are throwaway (FLOCKMUX_*), so nothing touches a real ~/.flockmux. The
        # agent-spawning smokes (swarm/resume/stress) need claude/codex on PATH +
        # login, so they stay manual — see scripts/golden-cli-test.sh.
        run: |
          set -euo pipefail
          D="$(mktemp -d)"
          FLOCKMUX_PORT=7799 FLOCKMUX_SERVER_URL=http://127.0.0.1:7799 \
            FLOCKMUX_DB_PATH="$D/d.db" FLOCKMUX_WORKSPACES_DIR="$D/ws" \
            FLOCKMUX_BLACKBOARD_DIR="$D/bb" FLOCKMUX_RECORDINGS_DIR="$D/rec" \
            RUST_LOG=error ./target/debug/flockmux-server &
          SRV=$!
          trap 'kill "$SRV" 2>/dev/null || true' EXIT
          for _ in $(seq 1 60); do
            curl -sf http://127.0.0.1:7799/api/workspaces >/dev/null 2>&1 && break
            sleep 0.5
          done
          FLOCKMUX_PORT=7799 node scripts/directions-smoke.mjs

  web:
    name: Web (typecheck · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
        working-directory: web
      - name: Typecheck + build (hard gate)
        # `npm run build` is `tsc -b && vite build`; tsc is the typecheck gate.
        run: npm run build
        working-directory: web
      - name: Unit tests (vitest, hard gate)
        run: npm run test
        working-directory: web
      - name: Lint (eslint — react-hooks rules-of-hooks is the hard gate; the
          # exhaustive-deps + ghost-disable findings are warnings, not blockers)
        run: npm run lint
        working-directory: web

  audit:
    name: Dependency audit (cargo-audit · npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      # cargo-audit checks Cargo.lock against the RustSec advisory DB; installed
      # as a prebuilt binary (fast) rather than `cargo install` (compiles).
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      # Informational for now (existing advisories shouldn't block unrelated
      # PRs); tighten to a hard gate once the tree is clean. Dependabot opens
      # the remediation PRs (see .github/dependabot.yml).
      - name: cargo audit (informational)
        run: cargo audit
        continue-on-error: true
      - name: npm audit (informational)
        run: npm audit --audit-level=high
        working-directory: web
        continue-on-error: true

  e2e:
    name: Web e2e (Playwright · hard gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: Swatinem/rust-cache@v2
      - name: Build server (vite proxies /api → this)
        run: cargo build -p flockmux-server --locked
      - name: Install web deps
        run: npm ci
        working-directory: web
      # `channel: "chrome"` in playwright.config → install Google Chrome stable.
      - name: Install Playwright Chrome
        run: npx playwright install --with-deps chrome
        working-directory: web
      - name: Boot isolated server
        # Throwaway data dirs (FLOCKMUX_*), same pattern as the smoke job, so the
        # e2e run never touches a real ~/.flockmux. Playwright's webServer brings
        # up vite itself; this just backs its /api proxy.
        run: |
          set -euo pipefail
          D="$(mktemp -d)"
          FLOCKMUX_PORT=7777 FLOCKMUX_DB_PATH="$D/d.db" \
            FLOCKMUX_WORKSPACES_DIR="$D/ws" FLOCKMUX_BLACKBOARD_DIR="$D/bb" \
            FLOCKMUX_RECORDINGS_DIR="$D/rec" RUST_LOG=error \
            ./target/debug/flockmux-server &
          for _ in $(seq 1 60); do
            curl -sf http://127.0.0.1:7777/api/workspaces >/dev/null 2>&1 && break
            sleep 0.5
          done
      - name: Run e2e (hard gate)
        run: npm run test:e2e
        working-directory: web

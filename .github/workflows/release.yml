name: Desktop Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-tauri:
    name: Tauri ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            os: macos-latest
            target: aarch64-apple-darwin
            # The .app bundle is the stable CI artifact. Tauri's DMG step runs
            # Finder/hdiutil decoration scripts that can fail on hosted macOS
            # runners even after the application bundle has built correctly.
            args: --target aarch64-apple-darwin --bundles app
          - label: macOS x64
            os: macos-15-intel
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles app
          - label: Linux x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
          - label: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            web/src-tauri -> web/src-tauri/target

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Build Tauri sidecars
        shell: bash
        run: src-tauri/scripts/build-sidecar.sh release ${{ matrix.target }}
        working-directory: web

      - name: Build desktop bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: web
          args: ${{ matrix.args }}

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail

          target="${{ matrix.target }}"
          output_dir="$GITHUB_WORKSPACE/release-assets/$target"
          mkdir -p "$output_dir"

          while IFS= read -r asset; do
            cp "$asset" "$output_dir/$target-$(basename "$asset")"
          done < <(
            find web/src-tauri/target -type f \
              \( -name '*.AppImage' \
              -o -name '*.deb' \
              -o -name '*.rpm' \
              -o -name '*.msi' \
              -o -name '*.exe' \
              -o -name '*.dmg' \) \
              | sort
          )

          if [[ "$RUNNER_OS" == "macOS" ]]; then
            while IFS= read -r app; do
              (
                cd "$(dirname "$app")"
                zip -qry "$output_dir/$target-$(basename "$app").zip" "$(basename "$app")"
              )
            done < <(find web/src-tauri/target -type d -name '*.app' | sort)
          fi

          find "$output_dir" -type f | sort
          test -n "$(find "$output_dir" -type f -print -quit)"

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v5
        with:
          name: flockmux-${{ matrix.target }}
          path: |
            release-assets/${{ matrix.target }}/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release assets
    runs-on: ubuntu-latest
    needs: build-tauri
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v5
        with:
          path: release-artifacts

      - name: List release assets
        shell: bash
        run: |
          set -euo pipefail
          find release-artifacts -type f | sort
          test -n "$(find release-artifacts -type f -print -quit)"

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            release_tag="$GITHUB_REF_NAME"
            release_title="flockmux $GITHUB_REF_NAME"
            release_notes="Automated desktop builds for $GITHUB_REF_NAME."
            release_flags=(--latest)
          else
            release_tag="nightly"
            release_title="flockmux nightly"
            release_notes="$(printf 'Automated desktop builds from main.\n\nCommit: %s' "$GITHUB_SHA")"
            release_flags=(--prerelease --latest=false)
            git tag -f "$release_tag" "$GITHUB_SHA"
            git push -f origin "refs/tags/$release_tag"
          fi

          if gh release view "$release_tag" >/dev/null 2>&1; then
            gh release edit "$release_tag" \
              --title "$release_title" \
              --notes "$release_notes" \
              "${release_flags[@]}"
          else
            gh release create "$release_tag" \
              --title "$release_title" \
              --notes "$release_notes" \
              "${release_flags[@]}"
          fi

          mapfile -t release_assets < <(find release-artifacts -type f | sort)
          gh release upload "$release_tag" "${release_assets[@]}" --clobber

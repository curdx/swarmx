name: Desktop Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-tauri:
    name: Tauri ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            os: macos-latest
            target: aarch64-apple-darwin
            # The .app bundle is the stable CI artifact. Tauri's DMG step runs
            # Finder/hdiutil decoration scripts that can fail on hosted macOS
            # runners even after the application bundle has built correctly.
            args: --target aarch64-apple-darwin --bundles app
          - label: macOS x64
            os: macos-15-intel
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles app
          - label: Linux x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
          - label: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            web/src-tauri -> web/src-tauri/target

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Build Tauri sidecars
        shell: bash
        run: src-tauri/scripts/build-sidecar.sh release ${{ matrix.target }}
        working-directory: web

      - name: Build desktop bundle
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: web
          args: ${{ matrix.args }}

      - name: Build desktop bundle and attach to release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: web
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: "flockmux ${{ github.ref_name }}"
          releaseBody: "Automated desktop builds for ${{ github.ref_name }}."
          releaseDraft: true
          prerelease: false

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v5
        with:
          name: flockmux-${{ matrix.target }}
          path: |
            web/src-tauri/target/**/bundle/**/*
          if-no-files-found: error

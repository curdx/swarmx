# OpenAI Codex CLI plugin.
#
# Spawned under flockmux-shim. HOME is passed through so the agent reads
# OAuth credentials from ~/.codex/auth.json (codex >= 0.x stores OAuth
# tokens there after `codex login`).

id = "codex"
display_name = "Codex CLI"
binary = "codex"
# Skip approval prompts + sandbox. --yolo is an alias for the same
# preset; we use the canonical long form so the intent is explicit in
# logs. Codex still refuses to start under root, which we never do.
default_args = ["--dangerously-bypass-approvals-and-sandbox"]
home_env = "HOME"
billing_surface = "cli-account"
requires_explicit_billing_opt_in = false
# Pre-spawn ensures ~/.codex/config.toml carries one global
# `[mcp_servers.flockmux-swarm]` block. Per-spawn agent identity rides in
# via the FLOCKMUX_AGENT_ID env passthrough (codex spawns the MCP
# subprocess with the parent's env restricted to env_vars whitelist).
auto_inject_mcp = true
# Codex prints "Update available! Press enter to continue" on startup which
# blocks the headless PTY. Pre-spawn we set
# `~/.codex/version.json: dismissed_version = latest_version` so the gate is
# already cleared. Codex still tells the user about updates outside flockmux.
auto_dismiss_update = true
# Codex also asks "Do you trust the contents of this directory?" the first
# time it sees a path. Workspaces under ~/.flockmux/workspaces/ are flockmux's
# own — append `[projects."<ws>"] trust_level = "trusted"` to
# ~/.codex/config.toml pre-spawn.
auto_trust_workspace = true
# Pre-spawn writes a `Stop` hook into <workspace>/.codex/hooks.json that
# calls `flockmux-mcp wake-check`. At every turn boundary the hook probes
# /api/message/unread_count; if the agent has unread mail, the hook returns
# `{decision:"block", reason:"..."}` and codex continues into a new turn
# that picks the messages up via swarm_list_messages.
auto_inject_stop_hook = true
# (The "Hooks need review" dialog auto-answer now lives in [[ready_plan]] at
# the bottom of this file — data-driven, replaces the old
# auto_answer_hooks_dialog bool.)

# Which config FORMAT each auto_* patch uses. pre_spawn.rs dispatches on
# these, NOT on `id`. spawn.rs also gates the `--dangerously-bypass-hook-trust`
# probe on `stop_hook_format = "codex-hooks-json"`.
trust_format     = "codex-toml"        # appended [projects."<ws>"] trust_level
mcp_format       = "codex-global-toml" # global [mcp_servers.flockmux-swarm] in ~/.codex/config.toml
stop_hook_format = "codex-hooks-json"  # <ws>/.codex/hooks.json (timeout seconds)
stop_hook_timeout = 10                 # SECONDS (codex's hook schema unit; ms would be 2.7h)
input_settle_ms = 300                  # codex's ratatui input poll attaches ~120-180ms after ready
# Structured transport pilot metadata. This does NOT change the default spawn
# path; spawn.rs still uses PTY unless a future explicit opt-in driver consumes
# this field. Codex app-server is the first structured target because it stays
# on the Codex CLI account surface.
structured_args = ["app-server"]

# L5c model overlay: codex takes `-m/--model <MODEL>`. {model} is substituted
# at spawn with the per-spawn `model` (REST/MCP) or `default_model`. Unset
# default_model ⇒ codex uses its own configured default.
model_args = ["--model", "{model}"]
# codex has NO opus/sonnet/haiku — it's gpt-5.x. So the 模型 settings page must
# not show those tier rows for codex; it shows just codex's default model +
# effort. (A claude-tier role that lands on codex falls back to codex's default.)
native_tiers = false

# Reasoning effort overlay. codex takes `-c model_reasoning_effort=<v>` (CLI
# override beats config.toml + the sqlite-persisted last-used value, so we pass
# it on every spawn). {effort} is the concrete value from effort_levels below.
# Omitted when the direction has no effort set → codex's default (medium).
# Abstract `max` maps to codex's ceiling `xhigh` (model-dependent; coerces down
# if unsupported).
effort_args = ["-c", "model_reasoning_effort={effort}"]

[effort_levels]
low = "low"
medium = "medium"
high = "high"
xhigh = "xhigh"    # codex's own ceiling
max = "xhigh"      # codex has no "max" → coerce abstract max to its xhigh ceiling

# Post-spawn readiness automation (host-side). codex 0.130+ pops a "Hooks need
# review" TUI dialog the first time it sees a hooks.json path it hasn't recorded
# a trust hash for. flockmux mints a fresh workspace per spawn (= new path = new
# trust key), so it reappears every spawn; without an answer the headless PTY
# hangs on the menu. The server watches output and injects "2\r" (option 2 =
# "Trust all and continue" + Enter) once, within a 30s window. Keep `\r`.
[[ready_plan]]
kind = "answer_dialog"
needle = "Hooks need review"
response = "2\r"

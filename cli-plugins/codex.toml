# OpenAI Codex CLI plugin.
#
# Spawned under flockmux-shim. HOME is passed through so the agent reads
# OAuth credentials from ~/.codex/auth.json (codex >= 0.x stores OAuth
# tokens there after `codex login`).

id = "codex"
display_name = "Codex CLI"
binary = "codex"
# Skip approval prompts + sandbox. --yolo is an alias for the same
# preset; we use the canonical long form so the intent is explicit in
# logs. Codex still refuses to start under root, which we never do.
default_args = ["--dangerously-bypass-approvals-and-sandbox"]
ready_detect = "shim_osc"
# M4 honors `auto_inject_mcp = true` and appends a single global
# `[mcp_servers.flockmux-swarm]` section to ~/.codex/config.toml.
# `mcp_inject` is kept as documentation of which channel is used.
mcp_inject = "codex_global_toml"
home_env = "HOME"
# Pre-spawn ensures ~/.codex/config.toml carries one global
# `[mcp_servers.flockmux-swarm]` block. Per-spawn agent identity rides in
# via the FLOCKMUX_AGENT_ID env passthrough (codex spawns the MCP
# subprocess with the parent's env restricted to env_vars whitelist).
auto_inject_mcp = true
# Codex prints "Update available! Press enter to continue" on startup which
# blocks the headless PTY. Pre-spawn we set
# `~/.codex/version.json: dismissed_version = latest_version` so the gate is
# already cleared. Codex still tells the user about updates outside flockmux.
auto_dismiss_update = true
# Codex also asks "Do you trust the contents of this directory?" the first
# time it sees a path. Workspaces under ~/.flockmux/workspaces/ are flockmux's
# own — append `[projects."<ws>"] trust_level = "trusted"` to
# ~/.codex/config.toml pre-spawn.
auto_trust_workspace = true
# Pre-spawn writes a `Stop` hook into <workspace>/.codex/hooks.json that
# calls `flockmux-mcp wake-check`. At every turn boundary the hook probes
# /api/message/unread_count; if the agent has unread mail, the hook returns
# `{decision:"block", reason:"..."}` and codex continues into a new turn
# that picks the messages up via swarm_list_messages.
auto_inject_stop_hook = true
# codex 0.130+ pops a "Hooks need review" TUI dialog the first time it sees
# a hooks.json path it hasn't recorded a trust hash for. Because flockmux
# mints a fresh workspace per spawn (= new path = new trust key), the
# dialog reappears every spawn even after the user has approved an
# identical hook elsewhere. Without this flag the PTY hangs on the menu
# waiting for a keystroke we never deliver. With it the server watches
# output and injects "2 + Enter" once per agent to pick "Trust all and
# continue".
auto_answer_hooks_dialog = true

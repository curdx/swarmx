# OpenCode CLI plugin (Model A — PTY transport).
#
# Spawned under swarmx-shim as an interactive TUI, like claude/codex. swarmx
# writes a per-agent config file at ~/.swarmx/opencode/<agent_id>.json and
# sets `OPENCODE_CONFIG=<that file>` at spawn (spawn.rs).
#
# IMPORTANT (verified live against opencode 1.17.7): `OPENCODE_CONFIG` MERGES on
# top of the user's existing config, it does NOT replace it. swarmx's keys win
# on conflict (deep-merge, last-writer), so the per-agent file authoritatively
# sets: the swarmx-swarm MCP server (with this agent's identity in
# `environment`), `permission = "allow"`, `autoupdate = false`, and the wake
# plugin. The user's own `provider`/model config is PRESERVED (so the worker can
# authenticate and run a model) — which is what we want. The tradeoff: the
# user's personal MCP servers also merge in; opencode times bad ones out (5s
# default) rather than hard-blocking, so this is acceptable.
#
# Per-agent identity is still collision-free even in Shared-workspace spells:
# each process has its OWN OPENCODE_CONFIG file with its OWN agent_id, and
# swarmx writes no project-local <ws>/opencode.json that they'd clobber.
#
# Auth is SHARED ($XDG_DATA_HOME/opencode/auth.json), so a login (or a custom
# provider in the user's global config) applies to every worker; no per-agent auth.

id = "opencode"
display_name = "OpenCode"
binary = "opencode"
# Bare `opencode` launches the TUI ($0 [project]) in the PTY's cwd (the
# workspace). No approval-skip flag exists (opencode has none); permissions are
# granted via the per-agent config's `permission = "allow"` instead.
default_args = []
home_env = "HOME"
# opencode authenticates per-provider via its own `opencode auth login`
# (subscription logins like Anthropic/Copilot, or raw API keys). Treat it as a
# CLI-account surface like codex; swarmx still can't meter subscription spend.
billing_surface = "cli-account"
requires_explicit_billing_opt_in = false

# MCP: write the per-agent opencode.json (mcp + permission + autoupdate).
# Format `opencode-json` → pre_spawn::write_opencode_per_agent_config.
auto_inject_mcp = true
mcp_format = "opencode-json"

# Wake: opencode has NO blocking Stop hook (its only turn-end signal is a
# read-only `session.idle` event). So the wake loop runs as an opencode PLUGIN
# (cli-plugins/opencode/swarmx-wake.js): on `session.idle` it POSTs swarmx's
# `consume_wakes` endpoint and, when wakes are pending, re-prompts its own
# session via the SDK client. This plugin is the opencode equivalent of the
# claude/codex Stop hook. Merged into the SAME per-agent config file. Format
# `opencode-plugin` → pre_spawn::install_opencode_wake_plugin.
#
# NOTE: the plugin pairs with swarmx's wake-kick exactly like the claude/codex
# Stop hook does — the kick is a SHORT nudge that wakes an ALREADY-IDLE agent (the
# plugin only fires on the session.idle *transition*, so it can't nudge an agent
# that already settled), and the plugin then delivers the full wake reason via
# consume_wakes. For opencode the kick is delivered over the `/tui/*` HTTP control
# API (same path as the bootstrap, input_delivery below), NOT keystrokes. Do NOT
# "dedupe" by suppressing the kick for opencode: that would strand wakes for idle
# agents.
auto_inject_stop_hook = true
stop_hook_format = "opencode-plugin"

# No "do you trust this folder?" dialog in opencode (verified: zero hits in its
# source), so no trust patch.
auto_trust_workspace = false
trust_format = "none"
# The startup update is suppressed via `autoupdate = false` in the per-agent
# config (written by the mcp writer), not codex's version.json dance.
auto_dismiss_update = false

# Input delivery: opencode runs as a full-screen TUI in the PTY (terminal view +
# recordings work like claude/codex), but its TUI can't take a large (~24k-char)
# bootstrap via keystroke paste — the bracketed paste parks the TUI at READY and
# never submits (verified live, opencode 1.17.7). opencode's own remedy is the
# documented `/tui/*` HTTP control API its embedded server exposes (the surface
# its browser extension drives). So swarmx spawns the TUI with a known per-agent
# `--port` and POSTs append-prompt + submit-prompt instead of faking keystrokes.
# Deterministic and size-independent. See crate::opencode_tui + spawn.rs.
input_delivery = "opencode-tui-http"

# Keystroke-settle delay is irrelevant for opencode (prompts go over HTTP, not
# the TUI keyboard), so leave it at 0.
input_settle_ms = 0

# Model overlay: opencode's TUI accepts `--model provider/model` (verified:
# cli/cmd/tui.ts). {model} is substituted at spawn from the per-spawn model or
# default_model. native_tiers = false: opencode is multi-provider (provider/
# model ids), NOT claude's opus/sonnet/haiku vocabulary, so the 模型 page shows
# its default model + effort rows only (same as codex).
model_args = ["--model", "{model}"]
native_tiers = false

# Reasoning effort: opencode takes effort as a CONFIG-level provider option
# (reasoningEffort in opencode.json), NOT a CLI flag — so no argv effort
# overlay. (A future increment can write per-model reasoningEffort into the
# per-agent config.) Left empty = the model's own default.
effort_args = []

# Health needles — "alive but can't work" PTY signatures (see claude.toml). None
# yet: opencode's not-logged-in / quota banner text hasn't been captured in a
# verified swarmx recording, and we don't ship guessed substrings (a wrong
# needle stays silent — exactly the failure we're fixing). Until a real
# recording confirms the exact text, opencode's auth/quota failures are still
# surfaced by the first-response watchdog. Add verified entries here to upgrade
# that to an instant failure card:
# [[health_needles]]
# needle = "<verified substring>"
# reason = "OpenCode 未登录，请在终端运行 opencode auth login"
# kind = "auth"

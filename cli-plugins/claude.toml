# Claude Code CLI plugin.
#
# Spawned under flockmux-shim. HOME is passed through so the agent reads
# OAuth credentials from ~/.claude/.credentials.json on first launch (and
# subsequent launches skip the OAuth flow).

id = "claude"
display_name = "Claude Code"
binary = "claude"
# Skip per-tool approval prompts. flockmux workspaces are ephemeral,
# isolated, flockmux-owned; without this every MCP swarm_* tool call
# would gate on a manual "1. Yes" in the PTY and block M5-style
# autonomous coordination.
default_args = ["--dangerously-skip-permissions"]
home_env = "HOME"
# Workspaces we create under ~/.flockmux/workspaces/ are trusted by
# construction; pre-patch the per-project flag so claude doesn't prompt.
auto_trust_workspace = true
# Pre-spawn writes ~/.claude.json projects.<ws>.mcpServers.flockmux-swarm
# (local scope ⇒ no "trust this MCP server?" prompt). Per-spawn entry
# carries the agent_id.
auto_inject_mcp = true
# Pre-spawn writes a `Stop` hook into <workspace>/.claude/settings.local.json
# that calls `flockmux-mcp wake-check`. At every turn boundary the hook
# probes /api/message/unread_count; if the agent has unread mail, the hook
# returns `{decision:"block", reason:"..."}` and claude continues into a
# new turn that picks the messages up via swarm_list_messages.
auto_inject_stop_hook = true

# Which config FORMAT each auto_* patch uses. pre_spawn.rs dispatches on
# these, NOT on `id` — so behavior is data-driven and a claude-compatible
# CLI could reuse these values verbatim with zero Rust changes.
trust_format     = "claude-json"           # ~/.claude.json hasTrustDialogAccepted
mcp_format       = "claude-local-scope"    # ~/.claude.json local scope + per-agent --mcp-config
stop_hook_format = "claude-settings-local" # <ws>/.claude/settings.local.json (timeout ms)
stop_hook_timeout = 10000                  # milliseconds (claude's hook schema unit)
input_settle_ms = 0                        # claude accepts keystrokes immediately after ready

# L5c model overlay: how to pass a model to claude. {model} is substituted at
# spawn time with the per-spawn `model` (REST/MCP) or `default_model` below.
# claude accepts an alias ('opus'/'sonnet') or a full model id. With no
# default_model set, claude uses its own configured default.
model_args = ["--model", "{model}"]

# Reasoning effort overlay. 2026 Claude Code takes `--effort <level>` (per
# session); {effort} is the concrete value from effort_levels below. Omitted
# when the direction has no effort set → the model's own default (high on Opus
# 4.8). Unsupported levels degrade to the highest the model supports (no error);
# Haiku has no effort, so the flag is a documented no-op there.
effort_args = ["--effort", "{effort}"]
[effort_levels]
low = "low"
medium = "medium"
high = "high"
max = "max"     # claude's true ceiling, supported on the effort-aware models
